<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔罗 · 答案之书</title>

<style>
body{
  margin:0;
  font-family: "Arial";
  background: radial-gradient(circle at top,#1a1a2e,#0d0d14);
  color:#eee;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* 顶部 */
h1{
  margin:15px;
  font-size:20px;
}

/* 按钮区 */
.controls{
  display:flex;
  gap:10px;
  margin:10px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  background:#2c2c3a;
  color:white;
}

/* 卡牌区域 */
.board{
  position:relative;
  width:100%;
  height:420px;
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:10px;
}

/* 单卡 */
.card{
  width:140px;
  height:220px;
  perspective:1000px;
  position:absolute;
  transition: all 0.6s ease;
}

/* 漂浮 */
.float{
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%,100%{ transform: translateY(0px); }
  50%{ transform: translateY(-10px); }
}

/* 翻牌 */
.inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition: transform 0.8s;
}

.flip{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  border-radius:12px;
  overflow:hidden;
}

.backFace{
  transform:rotateY(180deg);
}

/* 信息 */
.info{
  width:90%;
  max-width:500px;
  margin-top:20px;
  background:#151520;
  padding:12px;
  border-radius:12px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<h1>🌙 塔罗 · 答案之书</h1>

<div class="controls">
  <button onclick="setMode(1)">单牌</button>
  <button onclick="setMode(2)">双牌</button>
  <button onclick="draw()">抽卡</button>
</div>

<div class="board" id="board"></div>

<div class="info" id="info">请点击“抽卡”</div>

<script>

/* =========================
   🎴 卡牌数据（你只需要填78张）
========================= */
const cards = [
{ name:"愚者", meaning:"出发", desc:"新的开始" },
{ name:"魔术师", meaning:"创造", desc:"行动力显化" },
{ name:"女祭司", meaning:"直觉", desc:"内在智慧" }
];

/* =========================
   ⚙ 状态
========================= */
let mode = 1;

/* =========================
   🎧 音效（无需文件）
========================= */
function playSound(type){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  if(type==="shuffle"){
    osc.frequency.value = 180;
  }else{
    osc.frequency.value = 520;
  }

  gain.gain.setValueAtTime(0.1, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.2);

  osc.start();
  osc.stop(ctx.currentTime+0.2);
}

/* =========================
   🌀 洗牌飞散动画
========================= */
function shuffle(){

  const board = document.getElementById("board");
  board.innerHTML = "";

  for(let i=0;i<12;i++){
    const c = document.createElement("div");
    c.className="card";
    c.style.left="50%";
    c.style.top="50%";
    c.style.transform="translate(-50%,-50%)";

    c.innerHTML = `<img src="back.jpg" style="width:100%;height:100%;border-radius:12px;">`;

    let x = (Math.random()*400-200)+"px";
    let y = (Math.random()*400-200)+"px";

    c.animate([
      { transform:`translate(-50%,-50%) scale(1)` },
      { transform:`translate(calc(-50% + ${x}), calc(-50% + ${y})) rotate(720deg) scale(0.3)`, opacity:0 }
    ],{
      duration:700,
      easing:"ease-out"
    });

    board.appendChild(c);

    setTimeout(()=>c.remove(),700);
  }

  playSound("shuffle");
}

/* =========================
   🎴 抽卡
========================= */
function draw(){

  shuffle();

  setTimeout(()=>{
    const board = document.getElementById("board");
    board.innerHTML = "";

    let count = mode;
    let resultText = "";

    for(let i=0;i<count;i++){

      const card = cards[Math.floor(Math.random()*cards.length)];
      const reversed = Math.random() < 0.5;

      const div = document.createElement("div");
      div.className = "card float";

      div.style.left = (50 + i*30 - count*15) + "%";

      div.innerHTML = `
        <div class="inner">
          <div class="face">
            <img src="back.jpg" style="width:100%;height:100%">
          </div>
          <div class="face backFace">
            <img src="cards/${card.name}.jpg" style="width:100%;height:100%">
          </div>
        </div>
      `;

      board.appendChild(div);

      setTimeout(()=>{
        div.querySelector(".inner").classList.add("flip");
        playSound("flip");
      },600);

      resultText += `
${card.name} ${reversed ? "逆位" : "正位"}
${card.meaning}
${card.desc}

-------------------
`;
    }

    resultText += `
✨ 提示：
答案只是片刻，不是结论。
你永远可以重新选择。
`;

    document.getElementById("info").innerText = resultText;

  },700);
}

/* =========================
   模式
========================= */
function setMode(m){
  mode = m;
  document.getElementById("info").innerText =
    m===1 ? "单牌模式" : "双牌模式";
}

setMode(1);

</script>

</body>
</html>
